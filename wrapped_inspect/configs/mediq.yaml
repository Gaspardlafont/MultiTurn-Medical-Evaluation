# ==============================================================================
# Inspect AI Config: MultiTurn-Medical-Evaluation — MediQ
# CLI usage: inspect eval --run-config wrapped_inspect/configs/mediq.yaml
# Override example: inspect eval --run-config wrapped_inspect/configs/mediq.yaml -T limit=10
# ==============================================================================
# IMPORTANT: Generation parameters (temperature, max_tokens, top_p, seed) must
# be set inside `task.args` below. Do NOT use Inspect's top-level
# `generate_config` — the wrapper builds its own GenerateConfig from these
# task args and passes it explicitly to every generate() call, so a top-level
# `generate_config` here would be silently ignored.
# ==============================================================================

task:
  task: wrapped_inspect/inspect_mediq_wrapped.py
  args:
    # --- Active Settings ---
    limit: 3               # Set to null to run on the whole dataset
    max_questions: 10

    # --- Optional Overrides (wrapper defaults shown) ---
    # dataset_path: mediQ/data/all_dev_good.jsonl
    # expert_class: BasicExpert        # BasicExpert / FixedExpert / BinaryExpert / NumericalExpert / NumericalCutOffExpert / ScaleExpert
    # patient_class: InstructPatient   # InstructPatient / RandomPatient / DirectPatient / FactSelectPatient
    # abstain_threshold: 0.8           # only used by NumericalCutOffExpert (0.8) / ScaleExpert (4.0)
    # rationale_generation: false
    # self_consistency: 1
    # temperature: null
    # max_tokens: null
    # top_p: null
    # seed: null

# ==============================================================================
# Model Configuration
#
# GPU Rules of Thumb:
# 1. Shared model: if roles use the same model, assign them the SAME `device`.
# 2. Different models: assign separate `device` IDs (full isolation) OR use the
#    same ID but cap `gpu_memory_utilization` on both to prevent OOM crashes.
#    Never leave `device` unset with two different models — they silently
#    land on the same GPU uncapped and the second one to start crashes.
# 3. Large models (e.g. a 70B): use `devices: [0, 1, 2, 3]` instead of
#    `device`. Inspect auto-sets tensor_parallel_size to len(devices) — don't
#    set tensor_parallel_size yourself, and don't mix `device`/`devices`.
# ==============================================================================

# Option 1: Single model for every role (active by default)
model:
  model: vllm/Qwen/Qwen2.5-7B-Instruct
  # args:
  #   device: 1              # match patient's device below if you switch to Option 2 and patient uses this same model
  #   devices: [0, 1, 2, 3]  # for a model too big for 1 GPU — see GPU Rules of Thumb #3

# Option 2: Different model per role (uncomment to use)
# model_roles:
#   expert:
#     model: vllm/EPFLiGHT/Apertus-8B-MeditronFO
#     args:
#       device: 0                # different model than patient/model -> own GPU by default
#       gpu_memory_utilization: 0.45
#   patient:
#     model: vllm/Qwen/Qwen2.5-7B-Instruct
#     args:
#       device: 1                # same model as `model:` above -> shares its server
#       gpu_memory_utilization: 0.45
