# Test config for inspect_meddxagent_wrapped.py, using Inspect's native
# --run-config (bundles task, model, model_roles into one file instead of a
# long CLI command).
#
# Run from harnesspect/:
#   inspect eval --run-config wrapped_inspect/configs/meddxagent.yaml
#
# CLI flags override values from this file, e.g. to bump the sample count:
#   inspect eval --run-config wrapped_inspect/configs/meddxagent.yaml -T limit=10
#
# Note: unlike the MediQ/AgentClinic wrappers, temperature/max_tokens are not
# exposed as -T args here — MEDDxAgent's own defaults apply (temperature=0.0).

task:
  task: wrapped_inspect/inspect_meddxagent_wrapped.py
  args:
    # --- active for this run ---
    dataset: icraftmd  # icraftmd / ddxplus / rarebench
    limit: 3 # set to null if you want to run on the whole dataset
    max_turns: 6
    max_questions: 10

    # --- everything below is commented out, so left at the wrapper's own
    # default (shown in each comment). Uncomment and edit any line to
    # override it for this run. ---
    # diagnosis_class: standard   # standard / cot (default: standard)
    # weak_match: true            # true = substring match, false = exact match (default: false)

# Model(s). Two ways to configure — pick one:
#
# 1) SAME MODEL FOR EVERY ROLE (active by default below): just set `model:`
#    and leave `model_roles:` commented out. diagnosis/history_taking/
#    patient/driver all fall back to this one model.
model: vllm/Qwen/Qwen2.5-7B-Instruct

# 2) DIFFERENT MODEL PER ROLE: uncomment model_roles below to pin specific
# roles to specific models. Roles are: diagnosis, history_taking, patient,
# driver (driver picks which agent — history_taking or diagnosis — goes
# next each turn, see OpenChoice). Any role not listed here still falls
# back to `model:` above. Each role's `args` maps to vLLM server kwargs
# (gpu_memory_utilization, tensor_parallel_size, etc.).
# model_roles:
#   diagnosis:
#     model: vllm/EPFLiGHT/Apertus-8B-MeditronFO
#     args:
#       # tensor_parallel_size: 8  # uncomment + set to your GPU count for bigger models (e.g. a 70B) that need to be split across multiple GPUs — not needed for this 8B model
#       gpu_memory_utilization: 0.45
#   history_taking:
#     model: vllm/Qwen/Qwen2.5-7B-Instruct
#     args:
#       gpu_memory_utilization: 0.45
#   patient:
#     model: vllm/Qwen/Qwen2.5-7B-Instruct
#     args:
#       gpu_memory_utilization: 0.45
#   driver:
#     model: vllm/Qwen/Qwen2.5-7B-Instruct
#     args:
#       gpu_memory_utilization: 0.45
