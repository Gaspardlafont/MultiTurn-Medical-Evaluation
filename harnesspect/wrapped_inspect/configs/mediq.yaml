# Test config for inspect_mediq_wrapped.py, using Inspect's native
# --run-config (bundles task, model, model_roles, generate/eval config into
# one file instead of a long CLI command).
#
# Run from harnesspect/:
#   inspect eval --run-config wrapped_inspect/configs/mediq_test.yaml
#
# CLI flags override values from this file, e.g. to bump the sample count:
#   inspect eval --run-config wrapped_inspect/configs/mediq_test.yaml -T limit=10
#
# IMPORTANT: temperature/max_tokens/top_p/seed below are OUR wrapper's own
# -T args (task.args), not Inspect's native top-level `generate_config:`
# field. The wrapper builds its own GenerateConfig internally from these
# task args and passes it explicitly to every generate() call — a top-level
# `generate_config:` in this file would be silently ignored by the wrapper.

task:
  task: wrapped_inspect/inspect_mediq_wrapped.py
  args:
    # --- active for this run ---
    limit: 3 # set to null if you want to run on the whole dataset
    max_questions: 10

    # --- everything below is commented out, so left at the wrapper's own
    # default (shown in each comment). Uncomment and edit any line to
    # override it for this run. ---
    # dataset_path: /abs/path/to/mediQ/data/all_dev_good.jsonl   # jsonl path (default: mediQ/data/all_dev_good.jsonl)
    # expert_class: BasicExpert       # BasicExpert / FixedExpert / BinaryExpert / NumericalExpert / NumericalCutOffExpert / ScaleExpert (default: BasicExpert)
    # patient_class: InstructPatient  # InstructPatient / RandomPatient / DirectPatient / FactSelectPatient (default: InstructPatient)
    # abstain_threshold: 0.8          # only used by NumericalCutOffExpert (default 0.8) / ScaleExpert (default 4.0)
    # rationale_generation: true      # true/false (default: false)
    # self_consistency: 3             # number of self-consistency samples (default: 1)
    # temperature: 0.7                # sampling temperature (default: model's own default)
    # max_tokens: 512                 # max tokens per generation (default: model's own default)
    # top_p: 0.9                      # nucleus sampling top_p (default: model's own default)
    # seed: 42                        # generation seed (default: null = not set)

# Fallback model for any role not pinned below.
model: vllm/Qwen/Qwen2.5-7B-Instruct

# Per-role model overrides. Each role's `args` maps to vLLM server kwargs
# (gpu_memory_utilization, tensor_parallel_size, etc.).
model_roles:
  expert:
    model: vllm/EPFLiGHT/Apertus-8B-MeditronFO
    args:
      # tensor_parallel_size: 8  # uncomment + set to your GPU count for bigger models (e.g. a 70B) that need to be split across multiple GPUs — not needed for this 8B model
      gpu_memory_utilization: 0.45
  patient:
    model: vllm/Qwen/Qwen2.5-7B-Instruct
    args:
      gpu_memory_utilization: 0.45
