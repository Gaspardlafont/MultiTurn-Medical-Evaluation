# AgentClinic, role-separated: doctor = Meditron (model under test),
# judge/patient/measurement = Qwen (a separate model, to avoid the
# self-grading confound where the model under test judges its own
# diagnosis). Both are launched by the harness itself via the vllm-server
# backend (one vLLM server per model) -- nothing to start by hand.
#
# Run:
#   python -m PtitWrap.cli --config PtitWrap/configs/agentclinic_meditron_vs_qwen.yaml
#
# Any single value can still be overridden ad hoc on the CLI, e.g.:
#   python -m PtitWrap.cli --config PtitWrap/configs/agentclinic_meditron_vs_qwen.yaml \
#       --task_args num_scenarios=50

model: vllm-server
model_args:
  pretrained: EPFLiGHT/Apertus-8B-MeditronFO
  port: 8000

judge_model: vllm-server
judge_model_args:
  pretrained: Qwen/Qwen2.5-7B-Instruct
  port: 8001

task: agentclinic
task_args:
  dataset: MedQA
  num_scenarios: 10
  total_inferences: 20

output: PtitWrap/results/agentclinic_meditron_vs_qwen.json
inspect_log: PtitWrap/results/inspect/agentclinic_meditron_vs_qwen.eval
